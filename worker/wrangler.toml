name = "gse-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# ── KV Namespace ──────────────────────────────────────────────────────────────
# Un solo namespace GSE_CONFIG che contiene tutte le chiavi:
#   gse_model_config  → configurazione modelli AI
#   gse_prompt        → prompt custom estrazione e narrativa
#   history_index     → array metadati storico estrazioni
#   history:<ts>:<cf> → record completo singola estrazione
#
# Per ottenere l'ID del namespace già creato:
#   wrangler kv:namespace list
# Poi sostituire l'id qui sotto.
[[kv_namespaces]]
binding = "GSE_CONFIG"
id      = "SOSTITUIRE_CON_ID_REALE"

# ── Secret (non va nel toml) ──────────────────────────────────────────────────
# wrangler secret put OPENROUTER_API_KEY

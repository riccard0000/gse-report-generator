name = "gse-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# KV Namespace per configurazione persistente (modelli AI + prompt custom)
# Per creare: wrangler kv:namespace create GSE_CONFIG
# Poi sostituire l'id qui sotto con quello restituito dal comando
[[kv_namespaces]]
binding = "GSE_CONFIG"
id      = "SOSTITUIRE_CON_ID_REALE"  # wrangler kv:namespace create GSE_CONFIG

# Secret (non va nel toml): wrangler secret put OPENROUTER_API_KEY

name: Debug Backend Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: rg-gse-report
      FUNCTION_APP: gse-proxy

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install function dependencies (production only)
        working-directory: functions
        run: npm install --omit=dev

      - name: Package functions zip
        run: |
          cd functions
          zip -r ../functions.zip . \
            --exclude "*.git*" \
            --exclude "local.settings.json"
          echo "Zip size: $(du -sh functions.zip | cut -f1)"
          echo "Zip contents:"
          unzip -l functions.zip

      - name: Remove WEBSITE_RUN_FROM_PACKAGE
        run: |
          az functionapp config appsettings delete \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --setting-names WEBSITE_RUN_FROM_PACKAGE || true

      - name: Update app settings
        run: |
          az functionapp config appsettings set \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --settings \
              FUNCTIONS_WORKER_RUNTIME="node" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              AZURE_STORAGE_TABLE_NAME="GseConfig" \
              AZURE_STORAGE_CONTAINER_NAME="gse-pdf-files" \
              FRONTEND_URL="${{ secrets.AZURE_STATIC_WEB_APPS_URL }}"

      - name: Deploy via Kudu ZIP deploy (debug mode)
        run: |
          az functionapp deployment source config-zip \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --src functions.zip \
            --debug 2>&1 || true
          echo "--- tentativo con az rest diretto ---"
          KUDU_URL=$(az functionapp show \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "defaultHostName" -o tsv | sed 's/\.azurewebsites\.net/.scm.azurewebsites.net/')
          echo "Kudu URL: $KUDU_URL"
          TOKEN=$(az account get-access-token --resource https://management.azure.com --query accessToken -o tsv)
          HTTP_STATUS=$(curl -s -o /tmp/kudu_response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @functions.zip \
            "https://$KUDU_URL/api/zipdeploy?isAsync=false")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/kudu_response.txt
          [ "$HTTP_STATUS" = "200" ] && echo "✅ Deploy completato" || exit 1

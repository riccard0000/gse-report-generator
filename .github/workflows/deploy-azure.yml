# Pipeline Azure — Frontend (Static Web App) + Backend (Azure Functions)
#
# BRANCH: questa pipeline gira SOLO su feature/azure-deploy e azure/**
# Il branch main e le sue pipeline Cloudflare restano invariati

name: Deploy to Azure

on:
  push:
    branches:
      - feature/azure-deploy
      - azure/**
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── BUILD ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL_PROD }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── DEPLOY FRONTEND → Azure Static Web Apps ────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: 'upload'
          app_location: 'dist'
          output_location: ''
          skip_app_build: true

  # ── SMOKE TEST ────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    env:
      SITE_URL: ${{ secrets.AZURE_STATIC_WEB_APPS_URL }}
    steps:
      - name: Wait for CDN propagation
        run: sleep 20
      - name: Smoke test — index.html risponde 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SITE_URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FAIL" && exit 1)

  # ── DEPLOY BACKEND → Azure Functions (Linux Consumption) ────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: smoke-test
    env:
      RESOURCE_GROUP: rg-gse-report
      FUNCTION_APP: gse-proxy

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install function dependencies (production only)
        working-directory: functions
        run: npm install --omit=dev

      - name: Package functions zip
        run: |
          cd functions
          zip -r ../functions.zip . \
            --exclude "*.git*" \
            --exclude "local.settings.json"
          echo "Zip size: $(du -sh functions.zip | cut -f1)"

      - name: Remove WEBSITE_RUN_FROM_PACKAGE (abilita filesystem scrivibile per Kudu)
        run: |
          az functionapp config appsettings delete \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --setting-names WEBSITE_RUN_FROM_PACKAGE || true

      - name: Update app settings
        run: |
          az functionapp config appsettings set \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --settings \
              FUNCTIONS_WORKER_RUNTIME="node" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              AZURE_STORAGE_TABLE_NAME="GseConfig" \
              AZURE_STORAGE_CONTAINER_NAME="gse-pdf-files" \
              FRONTEND_URL="${{ secrets.AZURE_STATIC_WEB_APPS_URL }}"

      - name: Deploy via Kudu ZIP deploy
        run: |
          az functionapp deployment source config-zip \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --src functions.zip
          echo "✅ Deploy completato"

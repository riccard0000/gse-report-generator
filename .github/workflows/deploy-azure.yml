name: Deploy to Azure

on:
  push:
    branches:
      - feature/azure-deploy
      - azure/**
  workflow_dispatch:
    inputs:
      backend_only:
        description: 'Deploy solo il backend (salta build/frontend/smoke-test)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.backend_only != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL_PROD }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.backend_only != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: 'upload'
          app_location: 'dist'
          output_location: ''
          skip_app_build: true

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ github.event.inputs.backend_only != 'true' }}
    env:
      SITE_URL: ${{ secrets.AZURE_STATIC_WEB_APPS_URL }}
    steps:
      - name: Wait for CDN propagation
        run: sleep 20
      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SITE_URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FAIL" && exit 1)

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: ${{ always() && (needs.smoke-test.result == 'success' || github.event.inputs.backend_only == 'true') }}
    env:
      RESOURCE_GROUP: rg-gse-report
      FUNCTION_APP: gse-proxy

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install function dependencies (prod only)
        working-directory: functions
        run: npm install --omit=dev

      - name: Zip functions package (exclude devDependencies source, keep node_modules prod)
        run: |
          cd functions
          zip -r ../functions-deploy.zip . \
            --exclude "*.test.*" \
            --exclude ".env*" \
            --exclude "jest.config.*" \
            --exclude "tsconfig*.json" \
            --exclude "*.map"
          cd ..
          echo "ZIP size: $(du -sh functions-deploy.zip | cut -f1)"

      - name: Update app settings
        run: |
          az functionapp config appsettings set \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --settings \
              FUNCTIONS_WORKER_RUNTIME="node" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              AZURE_STORAGE_TABLE_NAME="GseConfig" \
              AZURE_STORAGE_CONTAINER_NAME="gse-pdf-files" \
              FRONTEND_URL="${{ secrets.AZURE_STATIC_WEB_APPS_URL }}"

      - name: Deploy Azure Function
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP }}
          package: functions-deploy.zip
          respect-funcignore: true
          scm-do-build-during-deployment: false

      - name: Verify deploy
        run: |
          sleep 30
          STATUS=$(az functionapp show \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "state" -o tsv)
          echo "Function app state: $STATUS"
          [ "$STATUS" = "Running" ] && echo "✅ Deploy completato" || (echo "FAIL" && exit 1)

name: Deploy to Azure

on:
  push:
    branches:
      - feature/azure-deploy
      - azure/**
  workflow_dispatch:
    inputs:
      backend_only:
        description: 'Deploy solo il backend (salta build/frontend/smoke-test)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.backend_only != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL_PROD }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.backend_only != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: 'upload'
          app_location: 'dist'
          output_location: ''
          skip_app_build: true

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ github.event.inputs.backend_only != 'true' }}
    env:
      SITE_URL: ${{ secrets.AZURE_STATIC_WEB_APPS_URL }}
    steps:
      - name: Wait for CDN propagation
        run: sleep 20
      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SITE_URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FAIL" && exit 1)

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: ${{ always() && (needs.smoke-test.result == 'success' || github.event.inputs.backend_only == 'true') }}
    env:
      RESOURCE_GROUP: rg-gse-report
      FUNCTION_APP: gse-proxy

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-deployment health check
        run: |
          echo "🔍 Checking Function App state..."
          STATE=$(az functionapp show \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "state" -o tsv)
          echo "Current state: $STATE"
          if [ "$STATE" = "Stopped" ]; then
            echo "⏳ Starting stopped Function App..."
            az functionapp start --name $FUNCTION_APP --resource-group $RESOURCE_GROUP
            sleep 15
          fi

      - name: Configure Function App settings
        run: |
          az functionapp config appsettings set \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --settings \
              WEBSITE_RUN_FROM_PACKAGE="0" \
              AzureWebJobsStorage="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              FUNCTIONS_WORKER_RUNTIME="node" \
              FUNCTIONS_EXTENSION_VERSION="~4" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              AZURE_STORAGE_TABLE_NAME="GseConfig" \
              AZURE_STORAGE_CONTAINER_NAME="gse-pdf-files" \
              FRONTEND_URL="${{ secrets.AZURE_STATIC_WEB_APPS_URL }}"

      - name: Install dependencies and create package
        run: |
          cd functions
          npm ci --omit=dev
          zip -r ../functions-deploy.zip . \
            -x "*.test.js" \
            -x ".env*" \
            -x "local.settings.json*" \
            -x ".git*" \
            -x ".DS_Store" \
            -x "test-local.js"
          cd ..
          echo "✅ Package created"
          echo "ZIP size: $(du -sh functions-deploy.zip | cut -f1)"
          unzip -t functions-deploy.zip > /dev/null && echo "✅ ZIP valid" || (echo "❌ ZIP corrupt" && exit 1)

      - name: Wait for any pending deployment to clear (avoids 409 conflict)
        run: |
          echo "⏳ Checking for active deployments..."
          for i in $(seq 1 12); do
            ACTIVE=$(az functionapp deployment list \
              --name $FUNCTION_APP \
              --resource-group $RESOURCE_GROUP \
              --query "[?active==\`true\`] | length(@)" -o tsv 2>/dev/null || echo "0")
            echo "Attempt $i/12 — active deployments: $ACTIVE"
            [ "$ACTIVE" = "0" ] && echo "✅ No active deployments, proceeding" && break
            [ "$i" = "12" ] && echo "⚠️ Timeout waiting for deployments, proceeding anyway"
            sleep 15
          done

      - name: Deploy via Azure CLI (handles cold start, retry and timeout natively)
        timeout-minutes: 15
        run: |
          echo "🚀 Deploying via az functionapp deploy..."
          az functionapp deploy \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --src-path functions-deploy.zip \
            --type zip \
            --async false
          echo "✅ Deploy completed"

      - name: Restart and wait for trigger sync
        run: |
          echo "🔄 Restarting Function App..."
          az functionapp restart --name $FUNCTION_APP --resource-group $RESOURCE_GROUP
          echo "⏳ Waiting 30s for trigger sync..."
          sleep 30

      - name: Verify deployment
        run: |
          STATE=$(az functionapp show \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "state" -o tsv)
          echo "Function app state: $STATE"

          FUNCTIONS=$(az functionapp function list \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "length(@)" -o tsv 2>/dev/null || echo "0")
          echo "Functions found: $FUNCTIONS"

          if [ "$FUNCTIONS" -gt "0" ]; then
            echo "✅ Triggers synced successfully"
            az functionapp function list \
              --name $FUNCTION_APP \
              --resource-group $RESOURCE_GROUP \
              --query "[].{name:name}" -o table
          else
            echo "⚠️  No functions listed yet - may still be initializing"
          fi

          [ "$STATE" = "Running" ] && echo "✅ Deploy completed successfully" || (echo "❌ App not Running" && exit 1)

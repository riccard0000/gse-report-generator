name: Deploy to Azure

on:
  push:
    branches:
      - feature/azure-deploy
      - azure/**
  workflow_dispatch:
    inputs:
      backend_only:
        description: 'Deploy solo il backend (salta build/frontend/smoke-test)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.backend_only != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
        env:
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL_PROD }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.backend_only != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: 'upload'
          app_location: 'dist'
          output_location: ''
          skip_app_build: true

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    if: ${{ github.event.inputs.backend_only != 'true' }}
    env:
      SITE_URL: ${{ secrets.AZURE_STATIC_WEB_APPS_URL }}
    steps:
      - name: Wait for CDN propagation
        run: sleep 20
      - name: Smoke test
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SITE_URL")
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || (echo "FAIL" && exit 1)

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: ${{ always() && (needs.smoke-test.result == 'success' || github.event.inputs.backend_only == 'true') }}
    env:
      RESOURCE_GROUP: rg-gse-report
      FUNCTION_APP: gse-proxy

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure Function App settings
        run: |
          az functionapp config appsettings set \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --settings \
              WEBSITE_RUN_FROM_PACKAGE="1" \
              AzureWebJobsStorage="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              FUNCTIONS_WORKER_RUNTIME="node" \
              FUNCTIONS_EXTENSION_VERSION="~4" \
              ENABLE_MSBUILD_PATH="true" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              STORAGE_ACCOUNT_NAME="${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              AZURE_STORAGE_TABLE_NAME="GseConfig" \
              AZURE_STORAGE_CONTAINER_NAME="gse-pdf-files" \
              FRONTEND_URL="${{ secrets.AZURE_STATIC_WEB_APPS_URL }}"

      - name: Clean and install function dependencies
        working-directory: functions
        run: |
          rm -rf node_modules package-lock.json
          npm clean-install

      - name: Create functions deployment package
        run: |
          cd functions
          # Include node_modules in zip for Consumption plan stability
          zip -r ../functions-deploy.zip . \
            -x "*.test.js" \
            ".env*" \
            "local.settings.json*" \
            ".git*" \
            "README.md" \
            "*.md"
          cd ..
          echo "Package created successfully"
          echo "ZIP size: $(du -sh functions-deploy.zip | cut -f1)"
          echo "ZIP contents verification:"
          unzip -l functions-deploy.zip | head -30

      - name: Deploy Azure Function
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP }}
          package: functions-deploy.zip
          scm-do-build-during-deployment: true

      - name: Verify deploy and check sync status
        run: |
          echo "⏳ Waiting for Function App to initialize triggers..."
          sleep 30
          
          STATUS=$(az functionapp show \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "state" -o tsv)
          echo "Function app state: $STATUS"
          
          # Get last 10 lines of logs
          echo ""
          echo "📋 Recent activity (last 10 entries):"
          az functionapp log tail \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --provider Microsoft.Web \
            --max-lines 10 || echo "⚠️  Log tail not available yet"
          
          # Check if functions are synced
          echo ""
          echo "🔍 Checking function sync status..."
          FUNCTIONS=$(az functionapp function list \
            --name $FUNCTION_APP \
            --resource-group $RESOURCE_GROUP \
            --query "length(@)" -o tsv)
          
          if [ "$FUNCTIONS" -gt "0" ]; then
            echo "✅ Found $FUNCTIONS function(s) - triggers synced successfully"
            az functionapp function list \
              --name $FUNCTION_APP \
              --resource-group $RESOURCE_GROUP \
              --query "[].{name:name, language:language}" -o table
          else
            echo "❌ No functions found - trigger sync may have failed"
            echo "Troubleshooting: Check WEBSITE_RUN_FROM_PACKAGE and scm-do-build-during-deployment settings"
            exit 1
          fi
          
          # Final status check
          [ "$STATUS" = "Running" ] && echo "✅ Deploy completed successfully" || (echo "❌ Function app not in Running state" && exit 1)
